      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #fff;

      }
      .header {

      }
      .font-loader {
        font-family: "Poppins", "Cairo", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-container.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .three-d-loader {
        width: 64px;
        height: 64px;
        perspective: 800px;
      }
      .three-d-loader-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        animation: rotate3d 2s infinite linear;
      }
      .three-d-loader-face {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: rgba(34, 164, 230, 0.5);
        border: 2px solid #22a4e6;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0.9;
      }
      .three-d-loader-front {
        transform: translateZ(32px);
      }
      .three-d-loader-back {
        transform: translateZ(-32px) rotateY(180deg);
      }
      .three-d-loader-right {
        transform: translateX(32px) rotateY(90deg);
      }
      .three-d-loader-left {
        transform: translateX(-32px) rotateY(-90deg);
      }
      .three-d-loader-top {
        transform: translateY(-32px) rotateX(90deg);
      }
      .three-d-loader-bottom {
        transform: translateY(32px) rotateX(-90deg);
      }
      @keyframes rotate3d {
        0% {
          transform: rotateX(0) rotateY(0) rotateZ(0);
        }
        100% {
          transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
        }
      }
    </style>

    <div id="root"></div>
    <script>
      window.addEventListener("beforeunload", function () {
        document.getElementById("loader").classList.remove("hidden");
      });
      window.addEventListener("load", function () {
        setTimeout(function () {
          document.getElementById("loader").classList.add("hidden");
        }, 500);
      });
      setTimeout(function () {
        document.getElementById("loader").classList.add("hidden");
      }, 5000);
    </script>
